apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: authentication-service-postgresql
  name: authentication-service-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentication-service-postgresql
  strategy: {}
  template:
    metadata:
      labels:
        app: authentication-service-postgresql
    spec:
      containers:
      - image: postgres:latest
        name: postgres

        env:
        - name: POSTGRES_DB
          value: blockbusterauthenticationservice
        - name: POSTGRES_USER
          value: blockbuster
        - name: POSTGRES_PASSWORD
          value: blockbusterpass

        resources: {}
status: {}
